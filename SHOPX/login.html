<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2466a0, #4553d2);
    }

    .login-container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    .login-container h2 {
      margin-bottom: 20px;
      color: #333;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    .input-group label {
      font-size: 14px;
      color: #555;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
      outline: none;
    }

    .input-group input:focus {
      border-color: #1c517f;
    }

    .login-btn {
      width: 100%;
      padding: 10px;
      border: none;
      background: #4facfe;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-btn:hover {
      background: #00c6ff;
    }

    .footer {
      margin-top: 15px;
      font-size: 13px;
      color: #777;
    }

    .footer a {
      color: #4facfe;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h2>Login</h2>

    <!-- FORM START -->
    <form action="dashboard.html">
      
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>

      <!-- FIXED BUTTON -->
      <button type="submit" class="login-btn">Login</button>

    </form>
    <!-- FORM END -->

    <div class="footer">
      Don't have an account? <a href="#">Sign up</a>
    </div>
  </div>

</body>
</html>
